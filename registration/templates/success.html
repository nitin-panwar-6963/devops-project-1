<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Success</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #065f46, #000);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
}

.card {
    background: rgba(255,255,255,0.1);
    padding: 40px;
    border-radius: 15px;
    text-align: center;
    color: white;
    backdrop-filter: blur(10px);
    animation: pop 0.6s ease;
}

.card h1 {
    color: #22c55e;
}

.card a {
    display: inline-block;
    margin-top: 20px;
    padding: 10px 20px;
    background: #22c55e;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    transition: 0.3s;
}

.card a:hover {
    background: #16a34a;
}

/* Animation */
@keyframes pop {
    from {
        transform: scale(0.7);
        opacity: 0;
    }
    to {
        transform: scale(1);
        opacity: 1;
    }
}
</style>

</head>

<body>

<div class="card">
    <h1>🎉 Success!</h1>
    <p>Your registration has been submitted.</p>

    <a href="/">Submit Again</a>
</div>

</body>
</html>
